<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>База Знань</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #121217; color: white; margin: 0; padding: 15px; }
        .hidden { display: none !important; }
        
        .header { display: flex; align-items: center; margin-bottom: 20px; }
        .back-btn { background: none; border: none; color: #6e6eff; font-size: 18px; cursor: pointer; margin-right: 15px; padding: 0; }
        h2 { margin: 0; font-size: 20px; }

        /* Категорії */
        .cat-card { background: #1f1f26; border-radius: 12px; padding: 15px; margin-bottom: 10px; display: flex; align-items: center; border: 1px solid #2d2d3a; cursor: pointer; }
        .icon-box { width: 45px; height: 45px; border-radius: 10px; margin-right: 15px; display: flex; align-items: center; justify-content: center; font-size: 22px; }

        /* Сервіси */
        .service-card { background: #1a1a23; border: 1px solid #2d2d3a; border-radius: 12px; padding: 15px; margin-bottom: 12px; position: relative; cursor: pointer; }
        .service-card:active { background: #252530; }
        
        .service-header { display: flex; align-items: center; margin-bottom: 8px; }
        .service-icon { width: 32px; height: 32px; border-radius: 8px; background: #2d2d3a; margin-right: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
        .service-name { font-weight: bold; font-size: 16px; margin-right: 8px; }
        .stars { color: #ff9d2e; font-size: 12px; }
        
        .service-desc { font-size: 13px; color: #b0b0bc; line-height: 1.4; margin-bottom: 12px; }
        
        .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
        .tag { font-size: 11px; padding: 3px 10px; border-radius: 6px; font-weight: 500; }
        
        /* Кольори тегів для різних розділів */
        .tag-music { background: #3d2424; color: #ff7b7b; }
        .tag-voice { background: #242d3d; color: #7bafff; }
        .tag-image { background: #3d2438; color: #ff7be3; }
        .tag-video { background: #243d3d; color: #7bffff; }
        .tag-avatars { background: #2d243d; color: #b37bff; } /* Новий колір для Аватарів */
        
        .price-info { font-size: 12px; color: #888; display: flex; align-items: center; }
        .price-info::before { content: '💳'; margin-right: 6px; }

        .arrow { position: absolute; right: 15px; top: 15px; color: #444; font-size: 14px; }
    </style>
</head>

        function showScreen(id) {
            document.querySelectorAll('body > div').forEach(div => div.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function renderList(key) {
            const section = data[key];
            document.getElementById('items-title').innerText = section.title;
            const container = document.getElementById('items-container');
            container.innerHTML = '';

            section.items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'service-card';
                card.onclick = () => tg.openLink(item.url);
                
                let tagsHTML = item.tags.map(t => `<span class="tag ${section.tagClass}">${t}</span>`).join('');
                
                card.innerHTML = `
                    <div class="arrow">›</div>
                    <div class="service-header">
                        <div class="service-icon">${item.icon}</div>
                        <div class="service-name">${item.name}</div>
                        <div class="stars">${item.stars}</div>
                    </div>
                    <div class="service-desc">${item.desc}</div>
                    <div class="tags">${tagsHTML}</div>
                    <div class="price-info">${item.price}</div>
                `;
                container.appendChild(card);
            });
            showScreen('screen-items');
        }
