<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>База Знань</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #121217; color: white; margin: 0; padding: 15px; }
        .hidden { display: none !important; }
        
        .header { display: flex; align-items: center; margin-bottom: 20px; }
        .back-btn { background: none; border: none; color: #6e6eff; font-size: 18px; cursor: pointer; margin-right: 15px; padding: 0; }
        h2 { margin: 0; font-size: 20px; }

        /* Категорії */
        .cat-card { background: #1f1f26; border-radius: 12px; padding: 15px; margin-bottom: 10px; display: flex; align-items: center; border: 1px solid #2d2d3a; cursor: pointer; }
        .icon-box { width: 45px; height: 45px; border-radius: 10px; margin-right: 15px; display: flex; align-items: center; justify-content: center; font-size: 22px; }

        /* Сервіси */
        .service-card { background: #1a1a23; border: 1px solid #2d2d3a; border-radius: 12px; padding: 15px; margin-bottom: 12px; position: relative; cursor: pointer; }
        .service-card:active { background: #252530; }
        
        .service-header { display: flex; align-items: center; margin-bottom: 8px; }
        .service-icon { width: 32px; height: 32px; border-radius: 8px; background: #2d2d3a; margin-right: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
        .service-name { font-weight: bold; font-size: 16px; margin-right: 8px; }
        .stars { color: #ff9d2e; font-size: 12px; }
        
        .service-desc { font-size: 13px; color: #b0b0bc; line-height: 1.4; margin-bottom: 12px; }
        
        .tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
        .tag { font-size: 11px; padding: 3px 10px; border-radius: 6px; font-weight: 500; }
        
        /* Кольори тегів для різних розділів */
        .tag-music { background: #3d2424; color: #ff7b7b; }
        .tag-voice { background: #242d3d; color: #7bafff; }
        .tag-image { background: #3d2438; color: #ff7be3; }
        
        .price-info { font-size: 12px; color: #888; display: flex; align-items: center; }
        .price-info::before { content: '💳'; margin-right: 6px; }

        .arrow { position: absolute; right: 15px; top: 15px; color: #444; font-size: 14px; }
    </style>
</head>
<body>

    <div id="screen-main">
        <div class="header"><h2>База Знань 🛠️</h2></div>
        <div class="cat-card" onclick="showScreen('screen-ai-tools')">
            <div class="icon-box" style="background: #e6e6ff33;">🤖</div>
            <div style="flex-grow:1"><b>AI Інструменти</b><br><small style="color:#888">Найкращі сервіси</small></div>
            <div style="color:#6e6eff; font-weight:bold;">75</div>
        </div>
    </div>

    <div id="screen-ai-tools" class="hidden">
        <div class="header">
            <button class="back-btn" onclick="showScreen('screen-main')">←</button>
            <h2>AI Інструменти</h2>
        </div>
        
        <div class="cat-card" onclick="renderList('music')">
            <div class="icon-box" style="background: #ff7b7b33;">🎵</div>
            <div style="flex-grow:1"><b>Музика</b><br><small style="color:#888">AI для звуку та треків</small></div>
            <div style="color:#6e6eff; font-weight:bold;">5</div>
        </div>

        <div class="cat-card" onclick="renderList('voice')">
            <div class="icon-box" style="background: #ffd37b33;">🗣️</div>
            <div style="flex-grow:1"><b>Озвучка</b><br><small style="color:#888">AI для голосу</small></div>
            <div style="color:#6e6eff; font-weight:bold;">5</div>
        </div>

        <div class="cat-card" onclick="renderList('images')">
            <div class="icon-box" style="background: #ff7bea33;">🎨</div>
            <div style="flex-grow:1"><b>Зображення</b><br><small style="color:#888">Генерація та редагування</small></div>
            <div style="color:#6e6eff; font-weight:bold;">16</div>
        </div>
    </div>

    <div id="screen-items" class="hidden">
        <div class="header">
            <button class="back-btn" onclick="showScreen('screen-ai-tools')">←</button>
            <h2 id="items-title">Розділ</h2>
        </div>
        <div id="items-container"></div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        const data = {
            music: { title: "Музика", tagClass: "tag-music", items: [
                { name: "Suno", stars: "★★★★★", desc: "Генерація треків з вокалом по текстовому опису", tags: ["Вокал", "Інструментал"], price: "Безкоштовно / від $10/міс", url: "https://suno.com", icon: "🎵" },
                { name: "Udio", stars: "★★★★☆", desc: "Конкурент Suno з фокусом на якість звучання", tags: ["Висока якість", "Інструментали"], price: "Безкоштовно / від $10/міс", url: "https://udio.com", icon: "🎧" },
                { name: "Epidemic Sound", stars: "★★★★★", desc: "Бібліотека музики без копірайту для YouTube", tags: ["Без копірайту", "YouTube-safe"], price: "від $15/міс", url: "https://www.epidemicsound.com", icon: "🔊" },
                { name: "iLoveSong", stars: "★★★★☆", desc: "AI-генератор музики з вокалом. MP3 та MP4", tags: ["Вокал", "MP3/MP4"], price: "Безкоштовно / від $7/міс", url: "https://ilovesong.ai", icon: "💖" },
                { name: "Sonauto", stars: "★★★★☆", desc: "Безлімітний безкоштовний AI-генератор музики", tags: ["Безкоштовно", "4.5 хв треки"], price: "Безкоштовно (безлім)", url: "https://sonauto.ai", icon: "🎹" }
            ]},
            voice: { title: "Озвучка", tagClass: "tag-voice", items: [
                { name: "ElevenLabs", stars: "★★★★★", desc: "Найреалістичніший AI-голос. 30+ мов", tags: ["Клон голосу", "Українська"], price: "Безкоштовно / від $5/міс", url: "https://elevenlabs.io", icon: "🎙️" },
                { name: "Fish Audio", stars: "★★★★★", desc: "AI-озвучка з контролем емоцій", tags: ["Емоції", "2M+ голосів"], price: "Безкоштовно / платні плани", url: "https://fish.audio", icon: "🐟" },
                { name: "Murf.ai", stars: "★★★★☆", desc: "Професійна озвучка для реклами та подкастів", tags: ["Бізнес", "120+ голосів"], price: "Безкоштовно / від $19/міс", url: "https://murf.ai", icon: "📢" },
                { name: "MiniMax", stars: "★★★★★", desc: "Потужний TTS. Клонування з 5-сек зразка", tags: ["Real-time", "Мультимодальний"], price: "Безкоштовно / платні плани", url: "https://www.minimaxi.com", icon: "🔮" },
                { name: "Free TTS", stars: "★★★★☆", desc: "Безкоштовний TTS без лімітів на слова", tags: ["Без лімітів", "Браузер"], price: "Безкоштовно", url: "https://freetts.com", icon: "🆓" }
            ]},
            images: { title: "Зображення", tagClass: "tag-image", items: [
                { name: "Midjourney", stars: "★★★★★", desc: "Найкращий генератор зображень. Фотореалізм та арт", tags: ["Фотореалізм", "Арт", "Стилі"], price: "від $10/міс", url: "https://www.midjourney.com", icon: "🖼️" },
                { name: "DALL-E 3", stars: "★★★★☆", desc: "Від OpenAI. Вбудований в ChatGPT, розуміє текст", tags: ["Текст в зображенні", "ChatGPT"], price: "В ChatGPT Plus ($20/міс)", url: "https://openai.com/dall-e-3", icon: "🤖" },
                { name: "Flux", stars: "★★★★★", desc: "Новий генератор від авторів Stable Diffusion. Швидкий", tags: ["Безкоштовно", "Швидкий", "Open Source"], price: "Безкоштовно / від $10/міс", url: "https://fal.ai/models/flux", icon: "⚡" },
                { name: "Krea", stars: "★★★★★", desc: "Генерація в реальному часі. 64+ моделей, апскейл", tags: ["Real-time", "64+ моделей", "Апскейл"], price: "Безкоштовно / платні плани", url: "https://www.krea.ai", icon: "🎭" },
                { name: "Sora", stars: "★★★★★", desc: "Від OpenAI. Фотореалістичні зображення та відео", tags: ["Фотореалізм", "ChatGPT", "Кінематограф"], price: "В ChatGPT Plus ($20/міс)", url: "https://openai.com/sora", icon: "🌀" },
                { name: "Kling AI", stars: "★★★★★", desc: "Кінематографічна якість. Генерація з тексту", tags: ["60+ стилів", "Кіно-якість", "Доступно"], price: "Безкоштовно / від $0.007 за ген", url: "https://klingai.com", icon: "🎯" },
                { name: "Recraft", stars: "★★★★☆", desc: "AI для дизайнерів. Ілюстрації, іконки та брендинг", tags: ["Дизайн", "Ілюстрації", "Брендинг"], price: "Безкоштовно / платні плани", url: "https://www.recraft.ai", icon: "🖋️" },
                { name: "Whisk", stars: "★★★★★", desc: "Від Google. Генерація зображень через картинки", tags: ["Google", "Imagen 4", "Без промптів"], price: "180 кредитів/міс безкоштовно", url: "https://whisk.com", icon: "🪄" },
                { name: "Flow", stars: "★★★★★", desc: "AI-кінематограф від Google на базі Veo 3.1", tags: ["Google", "Veo 3.1", "Кінематограф"], price: "Безкоштовно / від $19.99/міс", url: "https://flow.google", icon: "🎬" },
                { name: "Higgsfield", stars: "★★★★☆", desc: "Анімація персонажів та людей з одного фото", tags: ["Персонажі", "Анімація", "Фото в відео"], price: "Безкоштовно / платні плани", url: "https://higgsfield.ai", icon: "🧬" },
                { name: "Leonardo", stars: "★★★★★", desc: "Потужна платформа, Canvas-редактор, контроль стилю", tags: ["Canvas", "Контроль стилю", "Безкоштовно"], price: "150 кредитів/день безкоштовно", url: "https://leonardo.ai", icon: "🎨" },
                { name: "Reve", stars: "★★★★☆", desc: "Акцент на високу якість та детальну деталізацію", tags: ["Деталізація", "Якість", "Новий"], price: "Безкоштовно / платні плани", url: "https://reve.ai", icon: "💎" },
                { name: "Dreamina", stars: "★★★★★", desc: "AI-генератор від CapCut. Інтеграція з відео", tags: ["CapCut", "Безкоштовно", "Відеомонтаж"], price: "Безкоштовно", url: "https://dreamina.capcut.com", icon: "☁️" },
                { name: "Ideogram", stars: "★★★★★", desc: "Найкращий AI для тексту на фото. Логотипи", tags: ["Текст", "Логотипи", "Типографіка"], price: "Безкоштовно / від $8/міс", url: "https://ideogram.ai", icon: "🔡" },
                { name: "Seedream 4", stars: "★★★★★", desc: "Від ByteDance. 2K за 1.8 сек, батч до 9 картинок", tags: ["ByteDance", "2K", "Швидкий"], price: "Безкоштовно / від $9.90/рік", url: "https://seedream.ai", icon: "🌱" },
                { name: "Nana Banana", stars: "★★★★☆", desc: "Google AI Studio. Генерація через Gemini", tags: ["Google", "Gemini", "Безкоштовно"], price: "Безкоштовно", url: "https://aistudio.google.com", icon: "🍌" }
            ]}
        };

        function showScreen(id) {
            document.querySelectorAll('body > div').forEach(div => div.classList.add('hidden'));
            document.getElementById(id).classList.remove('hidden');
        }

        function renderList(key) {
            const section = data[key];
            document.getElementById('items-title').innerText = section.title;
            const container = document.getElementById('items-container');
            container.innerHTML = '';

            section.items.forEach(item => {
                const card = document.createElement('div');
                card.className = 'service-card';
                card.onclick = () => tg.openLink(item.url);
                
                let tagsHTML = item.tags.map(t => `<span class="tag ${section.tagClass}">${t}</span>`).join('');
                
                card.innerHTML = `
                    <div class="arrow">›</div>
                    <div class="service-header">
                        <div class="service-icon">${item.icon}</div>
                        <div class="service-name">${item.name}</div>
                        <div class="stars">${item.stars}</div>
                    </div>
                    <div class="service-desc">${item.desc}</div>
                    <div class="tags">${tagsHTML}</div>
                    <div class="price-info">${item.price}</div>
                `;
                container.appendChild(card);
            });
            showScreen('screen-items');
        }
    </script>
</body>
</html>
