<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tools</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #1c1c27; color: white; margin: 0; padding: 15px; }
        .hidden { display: none !important; }
        
        /* Шапка */
        .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
        .back-btn { background: #333; border: none; color: #6e6eff; padding: 8px 12px; border-radius: 8px; cursor: pointer; }

        /* Карточки категорий */
        .card { 
            background: #252538; border-radius: 12px; padding: 15px; 
            margin-bottom: 10px; display: flex; align-items: center; 
            cursor: pointer; border: 1px solid #333;
        }
        .icon { width: 40px; height: 40px; border-radius: 8px; margin-right: 15px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
        .info { flex-grow: 1; }
        .title { font-weight: bold; font-size: 16px; margin-bottom: 4px; }
        .desc { font-size: 12px; color: #888; }
        
        /* Кнопка перехода на сервис */
        .go-btn { 
            background: #6e6eff; color: white; text-decoration: none; 
            padding: 8px 15px; border-radius: 8px; font-size: 14px; font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="main-screen">
        <div class="header">
            <h2>Привет, Роман! 👋</h2>
        </div>

        <div class="card" onclick="showSection('music-section')">
            <div class="icon" style="background: #e0f7ff;">🎵</div>
            <div class="info">
                <div class="title">Музыкальные сервисы</div>
                <div class="desc">Нейросети для музыки и плееры</div>
            </div>
        </div>

        <div class="card" onclick="showSection('ai-section')">
            <div class="icon" style="background: #e0e0ff;">🤖</div>
            <div class="info">
                <div class="title">AI Инструменты</div>
                <div class="desc">Текст, фото и генерация контента</div>
            </div>
        </div>
    </div>

    <div id="music-section" class="hidden">
        <div class="header">
            <button class="back-btn" onclick="showMain()">← Назад</button>
            <h3>Музыка</h3>
        </div>

        <div class="card">
            <div class="info">
                <div class="title">Suno AI</div>
                <div class="desc">Лучшая нейросеть для создания песен</div>
            </div>
            <a href="#" onclick="openExternal('https://suno.com')" class="go-btn">Открыть</a>
        </div>

        <div class="card">
            <div class="info">
                <div class="title">YouTube Music</div>
                <div class="desc">Твой основной плеер</div>
            </div>
            <a href="#" onclick="openExternal('https://music.youtube.com')" class="go-btn">Открыть</a>
        </div>
    </div>

    <div id="ai-section" class="hidden">
        <div class="header">
            <button class="back-btn" onclick="showMain()">← Назад</button>
            <h3>AI Инструменты</h3>
        </div>
        <p style="color: #888; text-align: center;">Тут скоро будут твои AI сервисы...</p>
    </div>

    <script>
        const tele = window.Telegram.WebApp;
        tele.ready();
        tele.expand(); // Разворачивает приложение на весь экран

        // Функция переключения разделов
        function showSection(sectionId) {
            document.getElementById('main-screen').classList.add('hidden');
            document.getElementById(sectionId).classList.remove('hidden');
        }

        // Функция возврата на главную
        function showMain() {
            document.getElementById('music-section').classList.add('hidden');
            document.getElementById('ai-section').classList.add('hidden');
            document.getElementById('main-screen').classList.remove('hidden');
        }

        // Функция открытия внешних ссылок в браузере
        function openExternal(url) {
            tele.openLink(url);
        }
    </script>
</body>
</html>
